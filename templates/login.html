<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Diet-Recommendator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --green: #2ECC71;
            --green-dark: #27AE60;
            --green-light: #e8f8f0;
            --text-dark: #1a1a2e;
            --text-mid: #4a5568;
            --text-light: #718096;
            --border: #e2e8f0;
            --bg: #f0f7f2;
            --white: #ffffff;
            --shadow: 0 10px 40px rgba(0,0,0,0.10);
            --radius: 16px;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* NAVBAR */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 48px;
            background: var(--white);
            box-shadow: 0 1px 12px rgba(0,0,0,0.06);
            z-index: 100;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--text-dark);
        }

        .nav-logo svg { width: 32px; height: 32px; }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 36px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-mid);
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover { color: var(--green-dark); }

        .nav-links .btn-nav {
            background: var(--green);
            color: white;
            padding: 9px 22px;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.2s, transform 0.15s;
        }

        .nav-links .btn-nav:hover { background: var(--green-dark); transform: translateY(-1px); }

        /* MAIN SPLIT LAYOUT */
        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: calc(100vh - 65px);
            overflow: hidden;
        }

        /* LEFT PANEL */
        .left-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 40px;
            background: var(--bg);
            overflow-y: auto;
        }

        .form-card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 48px 44px;
            width: 100%;
            max-width: 420px;
        }

        .form-card h1 {
            font-size: 1.85rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 6px;
        }

        .form-card .subtitle {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-bottom: 32px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper svg {
            position: absolute;
            left: 14px;
            width: 18px;
            height: 18px;
            color: var(--text-light);
        }

        .input-wrapper input {
            width: 100%;
            padding: 13px 14px 13px 42px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            color: var(--text-dark);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fafafa;
        }

        .input-wrapper input:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(46,204,113,0.12);
            background: white;
        }

        .input-wrapper input::placeholder { color: var(--text-light); }

        .forgot-link {
            display: block;
            text-align: right;
            margin-top: 6px;
            font-size: 0.8rem;
            color: var(--text-light);
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-link:hover { color: var(--green-dark); }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 14px;
            margin-top: 28px;
            background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 16px rgba(46,204,113,0.35);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(46,204,113,0.45);
        }

        .btn-submit:active { transform: translateY(0); }

        .signup-link {
            text-align: center;
            margin-top: 24px;
            font-size: 0.875rem;
            color: var(--text-light);
        }

        .signup-link a {
            color: var(--green-dark);
            font-weight: 700;
            text-decoration: none;
        }

        .signup-link a:hover { text-decoration: underline; }

        .error-msg {
            background: #fdecea;
            border: 1px solid #f5c6cb;
            color: #c0392b;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
        }

        /* RIGHT PANEL */
        .right-panel {
            position: relative;
            overflow: hidden;
        }

        .right-panel img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .right-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.08), rgba(0,0,0,0.25));
        }

        .right-badge {
            position: absolute;
            bottom: 48px;
            left: 40px;
            background: white;
            border-radius: 16px;
            padding: 20px 28px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
            max-width: 300px;
        }

        .right-badge svg {
            width: 36px;
            height: 36px;
            color: var(--green);
            margin-bottom: 8px;
        }

        .right-badge h2 {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text-dark);
            line-height: 1.3;
        }

        .right-badge h2 span { color: var(--green); }

        .right-badge p {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-top: 6px;
        }

        @media (max-width: 900px) {
            main { grid-template-columns: 1fr; }
            .right-panel { display: none; }
            .left-panel { padding: 40px 24px; }
            nav { padding: 16px 24px; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">
            <!-- leaf icon -->
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="#e8f8f0"/>
                <path d="M17 8c-2.5 0-5 1-6.5 3.5C9 13 9 15.5 9 17c1.5 0 4-.5 5.5-2 1.5-1.5 2.5-4 2.5-7z" fill="#2ECC71"/>
                <path d="M9 17c0-2.5.5-5 2-7" stroke="#27AE60" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            Diet-Recommendator
        </a>
        <ul class="nav-links">
            <li><a href="/">Features</a></li>
            <li><a href="/">How it Works</a></li>
            <li><a href="/signup" class="btn-nav">Sign Up</a></li>
        </ul>
    </nav>

    <main>
        <!-- LEFT: Login Form -->
        <div class="left-panel">
            <div class="form-card">
                <h1>Welcome Back!</h1>
                <p class="subtitle">Sign in to access your personalized plan</p>

                <div class="error-msg" id="errorMsg"></div>

                <form id="loginForm">
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
                            <input type="email" id="email" placeholder="e.g., alex@email.com" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                            <input type="password" id="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit" id="submitBtn">Sign In</button>
                </form>

                <p class="signup-link">Don't have an account? <a href="/signup">Sign Up</a></p>
            </div>
        </div>

        <!-- RIGHT: Hero Image -->
        <div class="right-panel">
            <img src="/static/nutrition.jpg" alt="Healthy fresh food ingredients">
            <div class="right-overlay"></div>
            <div class="right-badge">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
                </svg>
                <h2><span>BMI</span> &amp; <span>ML-Powered</span><br>Recommendations</h2>
                <p>Personalized meal plans using AI &amp; machine learning</p>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const errEl = document.getElementById('errorMsg');
            btn.textContent = 'Signing in...';
            btn.disabled = true;
            errEl.style.display = 'none';

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = '/get-started';
                } else {
                    errEl.textContent = data.error || 'Invalid email or password. Please try again.';
                    errEl.style.display = 'block';
                    btn.textContent = 'Sign In';
                    btn.disabled = false;
                }
            } catch (err) {
                errEl.textContent = 'Something went wrong. Please try again.';
                errEl.style.display = 'block';
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
